version: "3.9"

services:
  drycuzzi:
    build: .
    image: drycuzzi:latest
    container_name: drycuzzi-site
    ports:
      - "80:80"         # HTTP  → http://localhost
      - "8080:80"       # Alt   → http://localhost:8080 (if port 80 is taken)
    restart: unless-stopped
    environment:
      - TZ=UTC
